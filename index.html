  <body>
    <div class="card">
      <img src="dance.gif" alt="Dancing gif" width="300" />
      <h1 id="message">Let's Party!</h1>
      <button onclick="changeText()">Click me!</button>
      <br />
      <a class="quiz-link" href="quiz.html">Take the "What Animal Are You?" quiz!</a>
    </div>

    <script>
      function changeText() {
        var messages = [
          "Let's Party!",
          "Woohoo! 🎉",
          "You clicked it!",
          "Party time! 🎊",
          "Keep clicking! 🕺"
        ];

        var current = document.getElementById("message").innerText;
        var next = messages[(messages.indexOf(current) + 1) % messages.length];
        document.getElementById("message").innerText = next;
      }
    </script>
